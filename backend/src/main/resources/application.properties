# App
spring.application.name=devinevibes-ecommerce

# Datasource
spring.datasource.url=${JDBC_URL:jdbc:postgresql://localhost:5432/devinevibes}
spring.datasource.username=${JDBC_USER:postgres}
spring.datasource.password=${JDBC_PASS:postgres}

# Hikari
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=300000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis
spring.data.redis.url=${REDIS_URL}

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Mail
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USER_NAME:}
spring.mail.password=${EMAIL_SMTP_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Virtual Threads
spring.threads.virtual.enabled=true

# Server
server.port=${SERVER_PORT:8080}

# Custom App Config
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.ui.url=${APP_UI_URL:http://localhost:3000}

app.allowed.cors=${APP_ALLOWED_CORS:http://localhost:4200}
app.allowed.methods=${APP_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}

app.public.endpoints=${APP_PUBLIC_ENDPOINTS:/api/auth/google,/api/auth/send-otp,/api/auth/verify-otp,/api/auth/refresh,/api/products,/api/products/**,/api/coupons/apply,/api/webhooks/**,/oauth2/**}

# JWT
app.jwt.secret=${JWT_SECRET:change-this-secret-change-this-secret-32bytes}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET:change-this-refresh-secret-change-this-secret}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

# Google (custom)
app.google.client-id=${GOOGLE_CLIENT_ID:}

# Multipart file upload settings (50MB for videos)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2MB

# Storage
app.storage.type=${APP_STORAGE_TYPE:r2}

# Cloudflare R2
cloudflare.r2.access-key=${CLOUDFLARE_ACCESS_KEY:}
cloudflare.r2.secret-key=${CLOUDFLARE_SECRET_KEY:}
cloudflare.r2.endpoint=${CLOUDFLARE_ENDPOINT:https://example.r2.cloudflarestorage.com}

cloudflare.r2.bucket.avatars=${CLOUDFLARE_AVATAR_BUCKET:devinevibes-avatars}
cloudflare.r2.bucket.products=${CLOUDFLARE_PRODUCT_BUCKET:devinevibes-products}

cloudflare.r2.public-url.avatars=${CLOUDFLARE_AVATAR_URL:https://cdn.example.com/avatars}
cloudflare.r2.public-url.products=${CLOUDFLARE_PRODUCT_URL:https://cdn.example.com/products}

# Razorpay
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

# Shiprocket
shiprocket.email=${SHIPROCKET_EMAIL:}
shiprocket.password=${SHIPROCKET_PASSWORD:}


twilio.account-sid=${TWILIO_SID}
twilio.auth-token=${TWILIO_AUTH}
twilio.from-number=+15186227921

email.sender_email=${EMAIL_SENDER:noreply@devinevibes.in}
email.sender_name=${EMAIL_SENDER_NAME:Devine Vibes}
email.sender_address=${EMAIL_SENDER_ADDRESS:}
