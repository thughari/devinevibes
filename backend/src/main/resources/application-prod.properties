# App
spring.application.name=devinevibes-ecommerce

# Datasource
spring.datasource.url=${JDBC_URL}
spring.datasource.username=${JDBC_USER}
spring.datasource.password=${JDBC_PASS}

# Hikari
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.keepalive-time=30000

spring.jpa.open-in-view=false

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Redis
spring.data.redis.url=${REDIS_URL}

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Mail
spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=${EMAIL_USER_NAME}
spring.mail.password=${EMAIL_SMTP_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Virtual Threads
spring.threads.virtual.enabled=true

# Server
server.port=8080

# Custom App Config
app.base-url=${APP_BASE_URL}
app.ui.url=https://devinevibes.in

app.allowed.cors=https://devinevibes.in
app.allowed.methods=GET,POST,PUT,DELETE,OPTIONS

app.public.endpoints=/api/auth/google,/api/auth/send-otp,/api/auth/verify-otp,/api/auth/refresh,/api/products,/api/products/**,/api/coupons/apply,/api/webhooks/**,/oauth2/**

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=900000
app.jwt.refresh-secret=${JWT_REFRESH_SECRET}
app.jwt.refresh-expiration-ms=2592000000

# Google (custom)
app.google.client-id=${GOOGLE_CLIENT_ID}

# Multipart file upload settings (50MB for videos)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2MB

# Storage
app.storage.type=r2

# Cloudflare R2
cloudflare.r2.access-key=${CLOUDFLARE_ACCESS_KEY}
cloudflare.r2.secret-key=${CLOUDFLARE_SECRET_KEY}
cloudflare.r2.endpoint=${CLOUDFLARE_ENDPOINT}

cloudflare.r2.bucket.avatars=${CLOUDFLARE_AVATAR_BUCKET}
cloudflare.r2.bucket.products=${CLOUDFLARE_PRODUCT_BUCKET}

cloudflare.r2.public-url.avatars=${CLOUDFLARE_AVATAR_URL}
cloudflare.r2.public-url.products=${CLOUDFLARE_PRODUCT_URL}

# Razorpay
razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}

# Shiprocket
shiprocket.email=${SHIPROCKET_EMAIL}
shiprocket.password=${SHIPROCKET_PASSWORD}

# Twilio
twilio.account-sid=${TWILIO_SID}
twilio.auth-token=${TWILIO_AUTH}
twilio.from-number=+15186227921

# Email Identity
email.sender_email=${EMAIL_SENDER}
email.sender_name=${EMAIL_SENDER_NAME}
email.sender_address=${EMAIL_SENDER_ADDRESS}
