spring.application.name=devinevibes

server.port=8080
server.servlet.context-path=/

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/devinevibes}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

app.jwt.secret=${JWT_SECRET:VGhpc0lzQVNlY3VyZVN1ZmZpY2llbnRseUxvbmdCYXNlNjRTZWNyZXRLZXk=}
app.jwt.access-expiration-minutes=30
app.jwt.refresh-expiration-days=7
app.google.client-id=${GOOGLE_CLIENT_ID:}

logging.level.com.devinevibes=INFO
