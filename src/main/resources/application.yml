spring:
  application:
    name: devinevibes-ecommerce
  datasource:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/devinevibes}
    username: ${JDBC_USER:postgres}
    password: ${JDBC_PASS:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 120000
      max-lifetime: 300000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email,profile
  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USER_NAME:}
    password: ${EMAIL_SMTP_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  ui:
    url: ${APP_UI_URL:http://localhost:3000}
  allowed:
    cors: ${APP_ALLOWED_CORS:http://localhost:3000}
    methods: ${APP_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  public:
    endpoints: ${APP_PUBLIC_ENDPOINTS:/api/auth/google,/api/auth/send-otp,/api/auth/verify-otp,/api/products,/api/products/**,/api/webhooks/**,/oauth2/**}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-change-this-secret-32bytes}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-secret: ${JWT_REFRESH_SECRET:change-this-refresh-secret-change-this-secret}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  storage:
    type: ${APP_STORAGE_TYPE:r2}

cloudflare:
  r2:
    access-key: ${CLOUDFLARE_ACCESS_KEY:}
    secret-key: ${CLOUDFLARE_SECRET_KEY:}
    endpoint: ${CLOUDFLARE_ENDPOINT:https://example.r2.cloudflarestorage.com}
    bucket:
      avatars: ${CLOUDFLARE_AVATAR_BUCKET:devinevibes-avatars}
      products: ${CLOUDFLARE_PRODUCT_BUCKET:devinevibes-products}
    public-url:
      avatars: ${CLOUDFLARE_AVATAR_URL:https://cdn.example.com/avatars}
      products: ${CLOUDFLARE_PRODUCT_URL:https://cdn.example.com/products}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}

shiprocket:
  email: ${SHIPROCKET_EMAIL:}
  password: ${SHIPROCKET_PASSWORD:}
