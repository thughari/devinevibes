spring:
  application:
    name: devinevibes
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/devinevibes}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis

app:
  jwt:
    secret: ${JWT_SECRET:please-change-this-secret-key-to-a-long-string-12345678901234567890}
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000
  google:
    client-id: ${GOOGLE_CLIENT_ID:replace-with-google-client-id}

logging:
  level:
    org.springframework.security: INFO
    com.devinevibes: DEBUG
